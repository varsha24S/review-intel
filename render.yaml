services:
  - type: web
    name: review-intel-backend
    env: python
    buildCommand: pip install -r requirements.txt && python data/generate_seed.py
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FLASK_DEBUG
        value: false
    rootDir: backend
